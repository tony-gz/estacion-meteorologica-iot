# Configuración común (todos los perfiles).
# Los secretos provienen SIEMPRE de variables de entorno (constitución, principio V).
spring:
  application:
    name: WeatherStation_Backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/weatherstation}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}

  jpa:
    open-in-view: false
    hibernate:
      # Flyway es el dueño del esquema. 'none' garantiza arranque limpio;
      # se recomienda cambiar a 'validate' una vez verificado contra PostgreSQL.
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USER:}
    password: ${SMTP_PASS:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: ${PORT:8080}   # Render inyecta PORT

# Documentación de API
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

# Actuator: healthcheck para Render
management:
  endpoints:
    web:
      exposure:
        include: health,info
  health:
    # El SMTP saliente suele estar bloqueado en el hosting; su disponibilidad NO
    # debe condicionar el liveness. Sin esto, /actuator/health devuelve 503 y el
    # despliegue queda en "Timed Out". La salud de la BD sí se mantiene activa.
    mail:
      enabled: false

# Propiedades propias de la aplicación
app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-me-please-use-a-long-random-value-0123456789abcdef}
    access-exp-min: ${JWT_ACCESS_EXP_MIN:15}
    refresh-exp-days: ${JWT_REFRESH_EXP_DAYS:7}
  gemini:
    api-key: ${GEMINI_API_KEY:}
    model: ${GEMINI_MODEL:gemini-2.5-flash}
    base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com}
    timeout-seconds: ${GEMINI_TIMEOUT_SECONDS:20}
  cors:
    # Incluye el puerto del dev server de Vite (5173) y el preview (4173).
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:4173,http://localhost:3000,http://localhost:8080}
  ratelimit:
    ia-por-min: ${IA_RATELIMIT_POR_MIN:5}
    ia-por-dia: ${IA_RATELIMIT_POR_DIA:100}
  device:
    # Secreto SEPARADO del de usuarios (rotación independiente). Cambiar en prod.
    jwt-secret: ${DEVICE_JWT_SECRET:dev-device-secret-change-me-please-0123456789abcdef}
    jwt-exp-min: ${DEVICE_JWT_EXP_MIN:60}
    ratelimit-por-min: ${DEVICE_RATELIMIT_POR_MIN:30}
    timestamp-ventana-min: ${DEVICE_TIMESTAMP_VENTANA_MIN:15}
  ingesta:
    historial-cada-min: ${INGESTA_HISTORIAL_CADA_MIN:10}
  admin:
    email: ${ADMIN_EMAIL:admin@weatherstation.local}
    password: ${ADMIN_PASSWORD:Admin12345}
  alertas:
    intervalo-ms: ${APP_ALERTAS_INTERVALO_MS:300000}       # 5 min entre evaluaciones
    initial-delay-ms: ${APP_ALERTAS_INITIAL_DELAY_MS:30000} # 30 s tras el arranque
  solicitudes:
    # Remitente de los correos. DEBE ser un remitente verificado en Brevo.
    email-from: ${SOLICITUDES_EMAIL_FROM:noreply@climbot.app}
  email:
    # Envío por la API HTTP de SendGrid (SMTP no funciona en Render free).
    # Sin API key, el envío queda deshabilitado (solo se registra un aviso).
    sendgrid-api-key: ${SENDGRID_API_KEY:}
    sendgrid-base-url: ${SENDGRID_BASE_URL:https://api.sendgrid.com}
    from-name: ${EMAIL_FROM_NAME:CLIMBOT}
