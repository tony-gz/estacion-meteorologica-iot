# Blueprint de Render para el WeatherStation Backend.
# Despliega un servicio web (Docker). La base de datos es Neon PostgreSQL externa.
# Los secretos marcados con sync:false se introducen en el dashboard de Render.
services:
  - type: web
    name: weatherstation-backend
    runtime: docker
    plan: free
    rootDir: WeatherStation_Backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod

      # Base de datos (Neon PostgreSQL externa).
      # Obtén estos datos desde neon.tech → project → Connection Details.
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false

      # Seguridad (usuarios)
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false

      # Seguridad (dispositivos/estaciones): secreto SEPARADO del de usuarios
      - key: DEVICE_JWT_SECRET
        generateValue: true

      # Gemini
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash

      # CORS: orígenes de las apps cliente (Flutter/Web), separados por coma
      - key: CORS_ALLOWED_ORIGINS
        sync: false

      # Email transaccional (Brevo, API HTTP — SMTP no funciona en Render free)
      - key: BREVO_API_KEY
        sync: false
      # Remitente: DEBE estar verificado en Brevo (Senders).
      - key: SOLICITUDES_EMAIL_FROM
        sync: false
